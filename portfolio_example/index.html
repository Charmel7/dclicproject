<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accueil - Robbie Lens Photographie</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <div>
        <a href="index.html">
          <img
            class="icone"
            src="assets\logo.png"
            alt="Logo de l'entreprise de Robbie"
        /></a>
      </div><div>
      <nav>
        <div>
          <a href="index.html">Accueil </a>
          <a href="about.html">À propos </a>
          <a href="portfolio.html">Portfolio</a>
        </div></div>
      </nav>
    </header>
    <main>
      <section class="accueil-introduction">
        <div class="image-texte">
          <div class="img-containing">
          <img
            style="margin-left: 5em"
            src="assets\robbie-lens.png"
            alt="Ceci est la photo de Robibie Lens"
            class="img-bord"
          />
          <img src="assets/portfolio/Union.png" class="union" alt="" />
        </div>
        <div>
          <h1>Robbie Lens Photographie</h1>
          <p>
            Où <em>professionalisme</em> s’allie avec <em>passion</em>. Depuis
            plus de 5 ans maintenant, j’exerce mon métier avec la passion qui
            m’anime : capturer l’essence de chaque instant.
          </p></div>
        </div>
        
        <div class="ctp">
          <a href="#champContact" style="height: 60px;width:100px">UN PROJET ? ÉCRIVEZ-MOI</a>
        </div>
      </section>
      <section class="projet">
        <h2 style="color: #242424; text-align: center">Mon dernier projet</h2>
        <div class="projets">
          <div>
            <div><img src="assets\accueil\element-1.png" alt="" /></div>
            <div><img src="assets\accueil\element-2.png" alt="" /></div>
          </div>
          <div>
            <div><img src="assets\accueil\element-3.png" alt="" /></div>
            <div><img src="assets\accueil\element-4.png" alt="" /></div>
          </div>
          <div>
            <div><img src="assets\accueil\element-5.png" alt="" /></div>
            <div><img src="assets\accueil\element-6.png" alt="" /></div>
          </div>
        </div>
      </section>
      <section class="section-contact">
        <h2 style="display: block">Parlons de votre projet</h2>
        <div id="champContact">
          <form action="" method="get">
            <div class="nomMail">
              <div class="nm">
                <label for="name">nom:</label>
                <input
                  type="text"
                  name="name"
                  id="name"
                  style="border-radius: 5px"
                />
              </div>
              <div class="nm">
                <label for="mail">mail:</label>
                <input
                  type="email"
                  name="mail"
                  id="mail"
                  style="border-radius: 5px"
                />
              </div>
            </div>
            <div class="message" style="margin-left: 2em">
              <label for="message"> message: </label>
              <textarea
                name="message"
                id="message"
                rows="10"
                cols="47"
              ></textarea>
            </div>
            <div><input type="submit" value="Envoyer" class="ctp" /></div>
          </form>
        </div>
      </section>
    </main>

    <footer
      style="display: flex; flex-direction: row; justify-content: space-between"
    >
      <div>
        <a href="index.html"
          ><img
            class="icone"
            src="assets\logo.png"
            alt="Logo de l'entreprise de Robbie"
        /></a>
      </div>
      <div>
        <a href="https://x.com/" target="_blank"
          ><img
            class="icone"
            src="assets\twitter.png"
            alt="Cliquez pour aller vers ma page X"
        /></a>
        <a href="https://www.instagram.com/" target="_blank"
          ><img
            class="icone"
            src="assets\instagram.png"
            alt="Cliquez pour aller vers ma page instagram"
        /></a>
      </div>
    </footer>
  </body>
</html>
